<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sitemap | yashbhoi.tech</title>
  <meta name="robots" content="noindex, follow">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
    }

    body {
      background: #0b0f19;
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sitemap-wrapper {
      width: 90%;
      max-width: 700px;
      padding: 50px 40px;
      background: #111827;
      border-radius: 12px;
      border: 1px solid #1f2937;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 30px;
      color: #f9fafb;
      letter-spacing: 0.5px;
    }

    ul {
      list-style: none;
    }

    li {
      margin-bottom: 14px;
    }

    a {
      display: block;
      padding: 14px 18px;
      text-decoration: none;
      color: #d1d5db;
      border: 1px solid #1f2937;
      border-radius: 8px;
      background: #020617;
      transition: all 0.25s ease;
      font-size: 15px;
    }

    a:hover {
      background: #1f2937;
      color: #ffffff;
      transform: translateX(3px);
    }

    footer {
      margin-top: 35px;
      font-size: 13px;
      color: #6b7280;
      text-align: center;
    }

    @media (max-width: 500px) {
      .sitemap-wrapper {
        padding: 40px 25px;
      }
    }
  </style>
</head>

<body>

  <div class="sitemap-wrapper">
    <h1>Website Sitemap</h1>

    <ul>
      <li><a href="https://yashbhoi.tech/">Home</a></li>
      <li><a href="https://yashbhoi.tech/#portfolio">Portfolio</a></li>
      <li><a href="https://yashbhoi.tech/#about">About</a></li>
      <li><a href="https://yashbhoi.tech/#contact">Contact</a></li>
    </ul>

    <footer>
      © 2026 yashbhoi.tech
    </footer>
  </div>

</body>
</html>
